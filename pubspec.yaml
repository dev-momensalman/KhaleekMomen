name: islamic_audio_hub
description: "خليك مؤمن — تطبيق إسلامي شامل لمواقيت الصلاة والأذان والقرآن والراديو الإسلامي"
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  quran: ^1.0.2
  url_launcher: ^6.3.0
  cupertino_icons: ^1.0.8
  just_audio: ^0.9.43
  audio_service: ^0.18.15
  rxdart: ^0.28.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.2
  geolocator: ^13.0.2
  intl: ^0.20.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  permission_handler: ^11.3.1
  sensors_plus: ^4.0.2
  provider: ^6.1.2
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B6B4A"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  generate: true

  fonts:
    - family: QuranUthmani
      fonts:
        - asset: assets/fonts/QuranUthmani.ttf

  assets:
    - assets/icon/icon.png
    - assets/audio/adhan_makkah.mp3
    - assets/audio/adhan_alafasy.mp3
    - assets/audio/adhan_abdulbasit.mp3
    - assets/audio/adhan_refat.mp3
    - assets/audio/adhan_minshawi.mp3
    - assets/audio/adhan_ahmed_jalal.mp3
    - assets/audio/adhan_shaisha.mp3
    - assets/audio/adhan_belbashir.mp3
    - assets/audio/adhan_hamza_majali.mp3
    - assets/audio/adhan_mustafa_ismail.mp3